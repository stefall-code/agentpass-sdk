name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e agentpass-sdk[all]
          pip install ruff pytest pytest-cov

      - name: Ruff check
        run: ruff check app/ agentpass-sdk/tests/

      - name: Run tests
        run: pytest agentpass-sdk/tests/ -v
